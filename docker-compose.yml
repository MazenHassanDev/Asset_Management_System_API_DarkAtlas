services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Wait until Postgres can accept connections
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./api
    # Mount the source into /app so runserver's autoreload picks up edits without a rebuild
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # .env has DB_HOST=localhost for local dev; inside compose Postgres is reached
      # via the service name, so override it here. .env stays unchanged.
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
