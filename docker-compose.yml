services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Wait until Postgres can accept connections
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./api
    # Mount the source into /app so runserver's autoreload picks up edits without a rebuild
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # .env has DB_HOST=localhost for local dev; inside compose Postgres and
      # Redis are reached via their service names, so override here. .env stays
      # unchanged.
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      # The frontend's Vite proxy (changeOrigin) sends Host: app:8000, so the
      # API container must allow that hostname alongside localhost.
      ALLOWED_HOSTS: 127.0.0.1,localhost,app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Wait until Django can accept connections
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health/').status==200 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      # Mount source for hot reload, but keep the container's (linux) node_modules
      # via an anonymous volume so the host's darwin modules don't leak in.
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      # Optional: holds VITE_API_KEY. App still boots without it (clean clone);
      # mint a key and add it to frontend/.env to authenticate against the API.
      - path: ./frontend/.env
        required: false
    environment:
      # Vite's /api proxy must reach the API by its compose service name, not localhost.
      VITE_PROXY_TARGET: http://app:8000
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
